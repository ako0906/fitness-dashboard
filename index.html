<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0E16" />
  <title>SH / Cut Phase</title>

  <!-- Pretendard for everything Korean+body, Geist Mono only for tiny meta -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist-font@1.3.0/dist/mono/style.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">

    <!-- ───────── 1. 히어로 ───────── -->
    <header class="hero" id="hero">
      <button class="refresh" id="refreshBtn" aria-label="새로고침">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" aria-hidden="true">
          <path d="M13.5 8a5.5 5.5 0 1 1-1.62-3.9M13.5 3v3h-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="hero-section">
        <span class="hero-eyebrow">목표일까지</span>
        <span class="hero-display" id="dDay">—</span>
        <span class="hero-meta">2026년 7월 17일</span>
      </div>

      <div class="hero-divider"></div>

      <div class="hero-section">
        <span class="hero-eyebrow">체지방률 진행</span>
        <div class="progress-row">
          <span class="progress-current" id="currentBf">—</span>
          <span class="progress-target">목표 14.8%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-foot">
          <span id="progressPct">—</span>
          <span class="progress-start">시작 17.6%</span>
        </div>
      </div>

      <div class="updated" id="lastUpdated">—</div>
    </header>

    <!-- ───────── 2. 운동 잔디 ───────── -->
    <section class="card">
      <div class="card-head">
        <h2>운동 잔디</h2>
        <span class="card-sub" id="gridSubtitle">최근 1년</span>
      </div>
      <div class="heatmap-wrap">
        <div class="heatmap" id="heatmap"></div>
      </div>
      <div class="legend">
        <span class="dot dot-active"></span><span class="legend-label">운동한 날</span>
        <span class="dot dot-broken"></span><span class="legend-label">못 한 날</span>
        <span class="dot dot-today"></span><span class="legend-label">오늘</span>
      </div>
    </section>

    <!-- ───────── 3. 체성분 ───────── -->
    <section class="card">
      <div class="card-head">
        <h2>체성분</h2>
        <span class="card-sub">7일 변화</span>
      </div>
      <div class="metric-row">
        <div class="metric-card" id="card-weight">
          <span class="metric-label">체중</span>
          <span class="metric-num">—</span>
          <span class="metric-delta">—</span>
          <div class="sparkline-wrap"></div>
        </div>
        <div class="metric-card" id="card-skeletal">
          <span class="metric-label">골격근</span>
          <span class="metric-num">—</span>
          <span class="metric-delta">—</span>
          <div class="sparkline-wrap"></div>
        </div>
        <div class="metric-card" id="card-bf">
          <span class="metric-label">체지방률</span>
          <span class="metric-num">—</span>
          <span class="metric-delta">—</span>
          <div class="sparkline-wrap"></div>
        </div>
      </div>
      <div class="chart-sub-head">
        <span class="chart-sub-title">체지방률 추이</span>
        <span class="chart-sub-meta">목표 14.8%</span>
      </div>
      <div class="chart-wrap">
        <canvas id="bfChart"></canvas>
      </div>
    </section>

    <!-- ───────── 4. 오늘의 매크로 링 ───────── -->
    <section class="card">
      <div class="card-head">
        <h2>TODAY</h2>
        <span class="card-sub" id="todayType">—</span>
      </div>
      <div class="macro-grid" id="macroGrid">
        <!-- rings injected by JS -->
      </div>
    </section>

    <!-- ───────── 5. 주간 칼로리 / 단백질 바 ───────── -->
    <section class="card">
      <div class="card-head">
        <h2>WEEK</h2>
        <span class="card-sub">최근 7일</span>
      </div>
      <div class="chart-wrap chart-wrap-sm">
        <canvas id="kcalChart"></canvas>
      </div>
      <div class="chart-wrap chart-wrap-sm">
        <canvas id="proteinChart"></canvas>
      </div>
    </section>

    <!-- ───────── 6. 마지막 음주 카운터 ───────── -->
    <section class="card card-sober">
      <div class="card-head">
        <h2>SOBER STREAK</h2>
      </div>
      <div class="sober">
        <span class="sober-num" id="soberDays">—</span>
        <span class="sober-label">DAYS SINCE LAST DRINK</span>
        <span class="sober-meta" id="soberMeta"></span>
      </div>
    </section>

    <!-- ───────── 7. 이번주 vs 지난주 ───────── -->
    <section class="card">
      <div class="card-head">
        <h2>WEEK / WEEK</h2>
      </div>
      <div class="ww-grid" id="wwGrid">
        <!-- injected -->
      </div>
    </section>

    <!-- ───────── 8. 인사이트 카드 ───────── -->
    <section class="card card-insight">
      <div class="card-head">
        <h2>FORECAST</h2>
      </div>
      <div class="insights" id="insights">
        <!-- injected -->
      </div>
    </section>

    <footer class="footer">
      <span>Built for 석호 · 7.17 cut</span>
    </footer>
  </main>

  <!-- Tap detail modal -->
  <div class="modal" id="modal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <span id="modalDate">—</span>
        <button id="modalClose" aria-label="닫기">×</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
